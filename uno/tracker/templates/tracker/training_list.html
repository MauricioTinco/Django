<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tracker de Entrenamiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2 text-dark">Bitácora de Entrenamiento</h1>
            <a href="{% url 'training-create' %}" class="btn btn-primary">+ Registrar Día</a>
        </div>

        <div class="row">
            {% for training in trainings %}
            <div class="col-md-4 mb-3">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-secondary">{{ training.date }}</h5>
                        <span class="badge bg-info text-dark mb-2">{{ training.get_routine_type_display }}</span>
                        <p class="card-text text-muted">{{ training.notes|default:"Sin notas avanzadas." }}</p>
                    </div>
                    <div class="card-footer bg-transparent border-top-0">
                        <a href="{% url 'training-update' training.pk %}" class="btn btn-sm btn-outline-secondary w-100">Editar registro</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <div class="alert alert-warning text-center">No hay rutinas registradas aún. ¡Empieza hoy!</div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
